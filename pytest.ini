[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Treat warnings as errors — no silent degradation
filterwarnings =
    error
    ignore::DeprecationWarning:chromadb
    ignore::DeprecationWarning:pydantic
    ignore::DeprecationWarning:pkg_resources

# Always show short test summary, with extra detail on failures
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    slow: marks tests that hit the network or take > 2s (deselect with -m "not slow")
    live: marks tests that require real API keys
