version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: zeus_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
    volumes:
      - zeus_n8n_data:/home/node/.n8n

volumes:
  zeus_n8n_data:
