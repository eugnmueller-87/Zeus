name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/eugnmueller-87/pantheon

jobs:
  # ── 0. Quality Gate — must pass before anything ships ─────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-asyncio pytest-timeout

      - name: Run quality gate (144 tests)
        run: pytest tests/ --tb=short -q --strict-markers --timeout=30 -v
        env:
          # Agents that call external APIs must be mocked in tests.
          # These placeholders prevent import errors; real calls are
          # blocked by the mock layer in conftest.py.
          ANTHROPIC_API_KEY: "test-placeholder"
          UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "test-placeholder"
          HERMES_API_KEY: "test-placeholder"
          HERMES_BASE_URL: "https://placeholder.example.com"
          TELEGRAM_BOT_TOKEN: "test-placeholder"
          TELEGRAM_CHAT_ID: "0"

  # ── 1. Build & push Docker image to GHCR ──────────────────────
  build:
    needs: test          # ← blocked until quality gate passes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Only build on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to Hetzner via SSH ──────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_SERVER_IP }}
          username: pantheon
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/pantheon
            bash deploy.sh
            echo "Deployed $(date)"

  # ── 3. Build & deploy React dashboard to Cloudflare Pages ─────
  deploy-frontend:
    needs: test          # ← also blocked until quality gate passes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/frontend/package.json

      - name: Install dependencies
        working-directory: dashboard/frontend
        run: npm ci

      - name: Build
        working-directory: dashboard/frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: ${{ vars.CLOUDFLARE_READY == 'true' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: pantheon-dashboard
          directory: dashboard/frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
