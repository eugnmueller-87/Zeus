# Pantheon OS — Nginx Production Config

# Shared memory zone: 10 MB holds ~160 k unique IPs; 10 req/min per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;

server {
    listen 80;
    server_name moremanamoreproblems.de;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name moremanamoreproblems.de;

    ssl_certificate     /etc/letsencrypt/live/moremanamoreproblems.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moremanamoreproblems.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    location /api/zeus/ {
        limit_req          zone=api burst=5 nodelay;
        proxy_pass         http://zeus:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/ {
        proxy_pass         http://dashboard:8081/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass         http://dashboard:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /grafana/ {
        auth_basic           "Pantheon Analytics";
        auth_basic_user_file /etc/nginx/grafana.htpasswd;

        proxy_pass         http://grafana:3000/grafana/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    location / {
        root /usr/share/nginx/pantheon;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        proxy_pass http://zeus:8080/health;
    }
}
