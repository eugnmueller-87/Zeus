# Pantheon OS — Nginx Production Config
# Terminates SSL, proxies to zeus (8080) and dashboard (8081)
# Replace YOUR_DOMAIN with your actual domain (e.g. pantheon.eugenmueller.dev)

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── ZEUS Pipeline API ──────────────────────────────────────
    location /api/zeus/ {
        proxy_pass         http://zeus:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Dashboard REST API ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://dashboard:8081/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Dashboard WebSocket ────────────────────────────────────
    location /ws {
        proxy_pass         http://dashboard:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_read_timeout 3600s;            # keep WS alive 1h
        proxy_send_timeout 3600s;
    }

    # ── Health checks (unauthenticated) ───────────────────────
    location = /health {
        proxy_pass http://zeus:8080/health;
    }
}
